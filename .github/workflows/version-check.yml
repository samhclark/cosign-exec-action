name: Version Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-version:
    name: Version Check
    runs-on: ubuntu-latest

    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true

      - name: Check Version
        run: |
          version=$(grep 'image:' action.yml | grep -oP 'v[\d.]+[-\w.]*')
          if [ -z "$version" ]; then
            echo "::error::Could not extract version from action.yml"
            exit 1
          fi
          echo "Found version: $version"

          if git tag -l "v$version" | grep -q .; then
            echo "::error::Tag v$version already exists. Bump the version in action.yml."
            exit 1
          fi

          echo "Version v$version is new. Check passed."
