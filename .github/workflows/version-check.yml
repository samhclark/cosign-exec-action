name: Version Check

on:
  pull_request:
    branches:
      - main

env:
  MANIFEST_PATH: action.yml

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  check-version:
    name: Version Check
    runs-on: ubuntu-latest

    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Check Version
        id: check-version
        uses: issue-ops/semver@v3
        with:
          check-only: true
          manifest-path: ${{ env.MANIFEST_PATH }}
