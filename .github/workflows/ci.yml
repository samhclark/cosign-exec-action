name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test Container Image
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000

    env:
      TEST_TAG: localhost:5001/samhclark/cosign-exec-action:latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker BuildX
        id: setup-buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          install: true
          driver-opts: network=host

      - name: Build the Container
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: ${{ env.TEST_TAG }}

      - name: Test - Simple Mode
        id: test-simple
        run: |
          docker run \
            --env INPUT_ARGS=version \
            --rm ${{ env.TEST_TAG }}

      - name: Test - Each Mode
        id: test-each
        run: |
          docker run \
            --env INPUT_ARGS="{}" \
            --env INPUT_EACH=version \
            --rm ${{ env.TEST_TAG }}

      - name: Test - Each Mode Multi-line
        id: test-each-multi
        run: |
          docker run \
            --env INPUT_ARGS="{}" \
            --env "INPUT_EACH=$(printf 'version\nversion')" \
            --rm ${{ env.TEST_TAG }}
