name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck
        run: shellcheck *.sh scripts/*.sh

  test:
    name: Test Container Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract Expected Version
        id: expected
        run: |
          version=$(grep '^tag=' build-cosign.sh | grep -oP 'v\K[\d.]+[-\w.]*')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Expected cosign version: $version"

      - name: Build the Container
        run: podman build -t cosign-exec-action:test .

      - name: Test - Simple Mode
        run: |
          output=$(podman run --rm \
            --env 'INPUT_ARGS=version --json' \
            cosign-exec-action:test)
          echo "$output"
          count=$(echo "$output" | grep -c "\"gitVersion\": \"v${{ steps.expected.outputs.version }}\"")
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected 1 version line, got $count"
            exit 1
          fi

      - name: Test - Each Mode
        run: |
          output=$(podman run --rm \
            --env INPUT_ARGS="{}" \
            --env 'INPUT_EACH=version --json' \
            cosign-exec-action:test)
          echo "$output"
          count=$(echo "$output" | grep -c "\"gitVersion\": \"v${{ steps.expected.outputs.version }}\"")
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected 1 version line, got $count"
            exit 1
          fi

      - name: Test - Each Mode Multi-line
        run: |
          output=$(podman run --rm \
            --env INPUT_ARGS="{}" \
            --env "INPUT_EACH=$(printf 'version --json\nversion --json')" \
            cosign-exec-action:test)
          echo "$output"
          count=$(echo "$output" | grep -c "\"gitVersion\": \"v${{ steps.expected.outputs.version }}\"")
          if [ "$count" -ne 2 ]; then
            echo "::error::Expected 2 version lines, got $count"
            exit 1
          fi
