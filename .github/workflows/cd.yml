name: Continuous Delivery

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    name: Publish Container Image
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'dependabot/') == false)

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          ref: main

      - name: Extract Version
        id: version
        run: |
          version=$(grep 'image:' action.yml | grep -oP 'v\K[\d.]+[-\w.]*')
          if [ -z "$version" ]; then
            echo "::error::Could not extract version from action.yml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $version"

      - name: Login to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.actor }}" --password-stdin

          # Write credentials to Docker config.json so container actions can authenticate
          if [ -n "$XDG_RUNTIME_DIR" ]; then
            podman_auth_file="${XDG_RUNTIME_DIR}/containers/auth.json"
          else
            podman_auth_file="/tmp/podman-run-$(id -u)/containers/auth.json"
          fi

          mkdir -p "${HOME}/.docker"
          cp "$podman_auth_file" "${HOME}/.docker/config.json"

      - name: Build Container Image
        run: |
          podman build -t "ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.version }}" .

      - name: Tag and Push
        id: push
        run: |
          version="${{ steps.version.outputs.version }}"
          image="ghcr.io/${{ github.repository }}"
          primary="${image}:v${version}"

          tags=("v${version}")

          if [[ "$version" != *-* ]]; then
            IFS='.' read -r major minor _patch <<< "$version"
            tags+=("latest")
            tags+=("v${major}.${minor}")
            tags+=("v${major}")
          fi

          for tag in "${tags[@]}"; do
            podman tag "$primary" "${image}:${tag}"
          done

          podman push --digestfile=/tmp/digest "$primary"
          for tag in "${tags[@]:1}"; do
            podman push "${image}:${tag}"
          done

          digest=$(sed 's/sha256://' /tmp/digest)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Sign Container Image
        uses: ./
        with:
          args: 'sign ghcr.io/${{ github.repository }}@sha256:${{ steps.push.outputs.digest }} --yes'

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" --generate-notes
