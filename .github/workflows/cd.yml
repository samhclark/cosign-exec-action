name: Continuous Delivery

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Publish Container Image
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'dependabot/') == false)

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          ref: main

      - name: Extract Version
        id: version
        run: |
          version=$(grep 'image:' action.yml | grep -oP 'v\K[\d.]+[-\w.]*')
          if [ -z "$version" ]; then
            echo "::error::Could not extract version from action.yml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $version"

      - name: Check if already released
        id: check
        run: |
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "v${{ steps.version.outputs.version }} already exists as a git tag, skipping publish"
            echo "new_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "v${{ steps.version.outputs.version }} is new, proceeding with publish"
            echo "new_version=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Container Registry
        if: steps.check.outputs.new_version == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Container Image
        if: steps.check.outputs.new_version == 'true'
        run: |
          podman build -t "ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.version }}" .

      - name: Tag and Push
        if: steps.check.outputs.new_version == 'true'
        id: push
        run: |
          version="${{ steps.version.outputs.version }}"
          image="ghcr.io/${{ github.repository }}"
          primary="${image}:v${version}"

          tags=("v${version}")

          if [[ "$version" != *-* ]]; then
            IFS='.' read -r major minor _patch <<< "$version"
            tags+=("latest")
            tags+=("v${major}.${minor}")
            tags+=("v${major}")
          fi

          for tag in "${tags[@]}"; do
            podman tag "$primary" "${image}:${tag}"
          done

          podman push --digestfile=/tmp/digest "$primary"
          for tag in "${tags[@]:1}"; do
            podman push "${image}:${tag}"
          done

          digest=$(sed 's/sha256://' /tmp/digest)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Sign Container Image
        if: steps.check.outputs.new_version == 'true'
        uses: ./
        with:
          args: 'sign ghcr.io/${{ github.repository }}@sha256:${{ steps.push.outputs.digest }} --yes'
          registry-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Container Image
        if: steps.check.outputs.new_version == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: sha256:${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Create Release
        if: steps.check.outputs.new_version == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" --generate-notes
